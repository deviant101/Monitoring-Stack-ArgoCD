server:
  retention: "15d"
  # persistentVolume:
  #   enabled: true
  #   size: 8Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Native Gateway API HTTPRoute support (the prometheus chart's server.route map).
  # SECURITY: Prometheus has NO built-in auth and the Gateway is internet-facing,
  # so this is disabled by default — enabling it makes all metrics/targets
  # world-readable. Turn `enabled: true` only behind an auth proxy or an
  # internal Gateway.
  route:
    main:
      enabled: false
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      hostnames:
        - prometheus.rancher.live
      parentRefs:
        - name: cilium-gateway
          namespace: demo-gateway
          sectionName: https

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

extraScrapeConfigs: |
  - job_name: cloudnative-pg
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - database          # namespace where the pg cluster runs
    relabel_configs:
      # keep only CNPG instance pods (they carry the cnpg.io/cluster label)
      - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
        regex: .+
        action: keep
      # keep only the metrics port (9187), not the 5432 postgres port
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "9187"
        action: keep
      # tidy labels shown in Grafana
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
        target_label: cluster
      - source_labels: [__meta_kubernetes_pod_label_cnpg_io_instanceRole]
        target_label: role


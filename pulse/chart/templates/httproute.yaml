{{- if .Values.route.enabled }}
# Serves the app on the Gateway's HTTPS listener (TLS terminated at the Gateway).
# Plain HTTP to the host is not routed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "pulse.fullname" . }}
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.route.gateway.name }}
      namespace: {{ .Values.route.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.route.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "pulse.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}

replicaCount: 2
image:
  repository: ghcr.io/deviant101/monitoring-stack-argocd/pulse
  tag: "sha-af07fc8"
  pullPolicy: IfNotPresent
imagePullSecrets: []
#  - name: ghcr-creds

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
route:
  enabled: true
  gateway:
    name: cilium-gateway
    namespace: demo-gateway
  hostname: pulse.rancher.live
# Prometheus discovers this pod via annotations (the prometheus-community
# "prometheus" chart's default kubernetes-pods scrape job honours these).
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
# Enable only if the Prometheus Operator CRDs are installed in the cluster
# (e.g. kube-prometheus-stack). With the plain prometheus chart, leave false
# and rely on the podAnnotations above.
serviceMonitor:
  enabled: false
  interval: 15s
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

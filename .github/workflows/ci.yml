name: pulse CI

# Build + push the custom app image, then write the new tag back into the Helm
# values file. That Git commit is what ArgoCD reacts to (GitOps image update).
#
# Trigger is scoped to the app SOURCE only (not the chart) so the automated
# values.yaml update commit does NOT re-trigger this workflow — that breaks the
# otherwise-infinite loop.
on:
  push:
    branches: [main]
    paths:
      - pulse/app.py
      - pulse/requirements.txt
      - pulse/Dockerfile
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: write   # commit the updated tag back to the repo
  packages: write   # push the image to GHCR

jobs:
  build-push-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps and smoke-check
        working-directory: pulse
        run: |
          pip install -r requirements.txt
          python -m py_compile app.py
          # Boot the app and confirm the probe + metrics endpoints respond.
          gunicorn --bind 127.0.0.1:8080 --workers 1 app:app &
          sleep 3
          curl -fsS localhost:8080/healthz
          curl -fsS localhost:8080/metrics | grep -q app_build_info

      - name: Compute image metadata
        id: meta
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"            # GHCR requires lowercase
          TAG="sha-${GITHUB_SHA::7}"
          echo "image=ghcr.io/${REPO_LC}/pulse" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: pulse
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Update image tag in Helm values
        run: |
          yq -i '.image.tag = "${{ steps.meta.outputs.tag }}"' \
            pulse/chart/values.yaml

      - name: Commit updated image tag
        run: |
          if git diff --quiet -- pulse/chart/values.yaml; then
            echo "No tag change to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pulse/chart/values.yaml
          git commit -m "ci: update pulse image tag to ${{ steps.meta.outputs.tag }} [skip ci]"
          git push
